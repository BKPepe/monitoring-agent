# Generic HTTP Monitoring Agent
#
# Fetches a list of monitors from a compatible node API endpoint,
# performs HTTP availability checks, and posts results back.
#
# Required repository secrets:
#   API_URL  - Base URL of the node API (e.g. https://example.com/node_api.php)
#   API_KEY  - Authentication key for the API

name: Monitor Agent

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  check:
    name: HTTP Check
    runs-on: ubuntu-latest
    timeout-minutes: 4

    steps:
      - name: Run HTTP checks
        env:
          API_URL: ${{ secrets.API_URL }}
          API_KEY: ${{ secrets.API_KEY }}
        run: |
          python3 << 'PYTHON'
          import os, sys, json, time, urllib.request, urllib.error

          API_URL = os.environ.get('API_URL', '')
          API_KEY = os.environ.get('API_KEY', '')
          TIMEOUT  = 8

          if not API_URL or not API_KEY:
              print("ERROR: Missing API_URL or API_KEY secrets.")
              sys.exit(1)

          # Detect runner location via ASN lookup (ipinfo.io - free, no key needed)
          LOCATION = 'GitHub Actions'
          try:
              with urllib.request.urlopen('https://ipinfo.io/json', timeout=5) as r:
                  geo = json.loads(r.read().decode())
                  city    = geo.get('city', '')
                  country = geo.get('country', '')
                  org     = geo.get('org', '')   # e.g. "AS36459 GitHub"
                  asn_raw = org.split(' ')[0] if org else ''
                  org_name = ' '.join(org.split(' ')[1:4]) if org else ''
                  # Build country flag from 2-letter code
                  flag = ''.join(chr(0x1F1E6 + ord(c) - 65) for c in country) if len(country) == 2 else '🌐'
                  geo_str = ', '.join(filter(None, [city, country]))
                  asn_str = f'{asn_raw} {org_name}'.strip() if asn_raw else ''
                  LOCATION = f'{flag} {geo_str} ({asn_str})'.strip() if geo_str else 'GitHub Actions'
                  print(f'Runner location: {LOCATION}')
          except Exception as e:
              print(f'Location detection failed ({e}), using default.')

          def api_request(url, data=None):
              """Make an API request; on HTTP error print diagnosis without exposing URLs."""
              req = urllib.request.Request(
                  url,
                  data=data,
                  headers={'Content-Type': 'application/json', 'User-Agent': 'MonitorAgent/1.0'} if data
                  else {'User-Agent': 'MonitorAgent/1.0'}
              )
              try:
                  with urllib.request.urlopen(req, timeout=15) as r:
                      return r.getcode(), r.read().decode()
              except urllib.error.HTTPError as e:
                  body = ''
                  try:
                      body = e.read().decode()
                  except Exception:
                      pass
                  print(f"ERROR: HTTP {e.code} from API.")
                  if body.strip().startswith('{'):
                      print(f"  API response: {body[:200]}")
                  if e.code == 403:
                      print("  HINT: wrong API_KEY secret OR server firewall blocking this runner.")
                  raise
              except Exception as e:
                  print(f"ERROR: Request failed: {type(e).__name__}")
                  raise

          # Fetch monitor list
          try:
              code, body = api_request(f"{API_URL}?action=get_monitors&key={API_KEY}")
              monitors = json.loads(body).get('monitors', [])
          except Exception:
              sys.exit(1)

          print(f"Fetched {len(monitors)} monitors")

          # Run HTTP checks (web type only) — names and URLs not logged intentionally
          up, down, skipped = 0, 0, 0
          results = []
          for m in monitors:
              if m.get('type') != 'web':
                  skipped += 1
                  continue
              url = m['target']
              if not url.startswith(('http://', 'https://')):
                  url = 'https://' + url
              start = time.time()
              try:
                  req = urllib.request.Request(url, headers={'User-Agent': 'MonitorAgent/1.0'})
                  with urllib.request.urlopen(req, timeout=TIMEOUT) as r:
                      http_code = r.getcode()
                      rt = int((time.time() - start) * 1000)
                      ok = 200 <= http_code < 400
                      results.append({
                          'id': m['id'], 'status': 'up' if ok else 'down',
                          'response_time': rt, 'error': None if ok else f'HTTP {http_code}'
                      })
                      if ok: up += 1
                      else:   down += 1
              except urllib.error.HTTPError as e:
                  rt = int((time.time() - start) * 1000)
                  results.append({'id': m['id'], 'status': 'down', 'response_time': rt, 'error': f'HTTP {e.code}'})
                  down += 1
              except Exception as e:
                  rt = int((time.time() - start) * 1000)
                  results.append({'id': m['id'], 'status': 'down', 'response_time': rt, 'error': str(e)[:80]})
                  down += 1

          print(f"Results: {up} up, {down} down, {skipped} skipped (non-web)")

          if not results:
              print("No web monitors to check. Done.")
              sys.exit(0)

          # Post results
          payload = json.dumps({'location': LOCATION, 'results': results}).encode()
          try:
              code, body = api_request(
                  f"{API_URL}?action=post_results&key={API_KEY}",
                  data=payload
              )
              resp = json.loads(body)
              print(f"Posted {len(results)} results successfully.")
          except Exception:
              sys.exit(1)
          PYTHON
