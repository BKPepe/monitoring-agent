# Cloudflare Worker - HTTP Monitoring Agent
# Deploy: wrangler deploy (from this directory)
# Docs: https://developers.cloudflare.com/workers/wrangler/configuration/

name = "bloodkings-monitor"
main = "cloudflare-agent.js"
compatibility_date = "2024-01-01"

# Cron trigger: every 5 minutes
[triggers]
crons = ["*/5 * * * *"]

# Secrets are managed via GitHub Actions (see .github/workflows/deploy-worker.yml)
# and synced to Cloudflare automatically on every push to main.
# Manual setup (one-time only if not using GH Actions deploy):
#   wrangler secret put API_URL
#   wrangler secret put API_KEY
